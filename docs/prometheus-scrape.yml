# Example prometheus.yml snippet:
scrape_configs:
  - job_name: zfsdash
    static_configs:
      - targets:
        - localhost:8080   # replace with your ZFSdash host:port
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
