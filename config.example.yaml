# ZFSdash configuration example
# Copy to config.yaml and edit as needed

server:
  listen: ":8080"
  # api_key: "your-secret-key"  # optional: protect the API

hosts:
  # Local mode - runs on the ZFS host itself (default)
  - hostname: local
    mode: local
    timeout: 30

  # SSH mode - connect to a remote ZFS host
  # - hostname: my-nas
  #   mode: ssh
  #   host: 192.168.1.100
  #   port: 22
  #   username: root
  #   ssh_key: /home/user/.ssh/id_ed25519
  #   timeout: 30

  # TrueNAS mode - connect via TrueNAS REST API
  # - hostname: truenas
  #   mode: truenas
  #   host: https://truenas.local
  #   api_key: your-truenas-api-key
  #   timeout: 30

alerts:
  enabled: false
  capacity_warning: 80    # alert at 80% full
  capacity_critical: 90   # alert at 90% full
  cooldown_minutes: 60    # don't repeat alerts within 60 min
  # email:
  #   smtp_host: smtp.example.com
  #   smtp_port: 587
  #   username: alerts@example.com
  #   password: yourpassword
  #   from: alerts@example.com
  #   to:
  #     - admin@example.com
  # webhooks:
  #   - https://hooks.slack.com/services/...
  #   - https://yourapp.com/webhook

db:
  path: "/var/lib/zfsdash/history.db"
